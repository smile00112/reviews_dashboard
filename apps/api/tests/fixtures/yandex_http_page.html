<!DOCTYPE html>
<html lang="ru">
<head><meta charset="utf-8"><title>Кафе Пример — отзывы</title></head>
<body>
  <h1>Кафе Пример</h1>
  <div class="business-rating-badge-view__rating">4,3</div>
  <div>128 отзывов</div>

  <div class="business-review-view">
    <div class="business-review-view__author">
      <div class="business-review-view__author-name">Анна Иванова</div>
    </div>
    <div class="business-rating-badge-view__stars" aria-label="Оценка 4 Из 5"></div>
    <span class="business-review-view__body-text">Хорошее место, вкусно, но долго ждать заказ.</span>
    <span class="business-review-view__date">2 мая 2024</span>
  </div>

  <div class="business-review-view">
    <div class="business-review-view__author">
      <div class="business-review-view__author-name">Иван Петров</div>
    </div>
    <div class="business-rating-badge-view__stars" aria-label="Оценка 2 Из 5"></div>
    <span class="business-review-view__body-text">Грязно и невкусно, обслуживание медленное.</span>
    <span class="business-review-view__date">вчера</span>
  </div>

  <div class="business-review-view">
    <div class="business-review-view__author">
      <div class="business-review-view__author-name">Мария С.</div>
    </div>
    <div class="business-rating-badge-view__stars" aria-label="Оценка 5 Из 5"></div>
    <span class="business-review-view__body-text">Отличное кафе, всё понравилось!</span>
    <span class="business-review-view__date">10.01.2024</span>
  </div>
</body>
</html>
